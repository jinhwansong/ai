name: Send Push Notifications

# Cron 일시 중지됨 — 재개 시 schedule 블록 복구 (git 히스토리 참고)
on:
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: Send Push Notifications
        run: |
          curl -X POST "${{ secrets.CRON_ENDPOINT }}/api/internal/send-push-notifications" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}'
